<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STEM Modules</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --royal: #5C7CFA;
      --royal-dark: #4C6EF5;
      --royal-light: #748FFC;
      --royal-glow: rgba(92, 124, 250, 0.30);
      --royal-soft: rgba(92, 124, 250, 0.12);
      --surface: #0D0F1A;
      --surface-2: #12152B;
      --card: #161929;
      --card-hover: #1C2035;
      --text-primary: #E8ECFF;
      --text-secondary: #8892C0;
      --text-muted: #4E5880;
      --border: rgba(92, 124, 250, 0.14);
      --border-hover: rgba(92, 124, 250, 0.42);
      --shadow-sm: 0 2px 10px rgba(0,0,0,0.35);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.50);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.55);
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 75% 55% at 75% -5%, rgba(92,124,250,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 0% 100%, rgba(76,110,245,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 30% 30% at 50% 50%, rgba(92,124,250,0.03) 0%, transparent 100%);
    }

    /* ── PAGE ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .header-left {}

    .breadcrumb {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .breadcrumb span { color: var(--royal); }

    h1 {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    h1 em {
      font-style: normal;
      color: var(--royal);
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ── TOGGLE BUTTON ── */
    .btn-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 26px;
      background: var(--royal);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 18px var(--royal-glow);
      letter-spacing: 0.01em;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .btn-toggle::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-toggle:hover {
      background: var(--royal-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--royal-glow);
    }

    .btn-toggle:active { transform: translateY(0); }

    .btn-toggle svg { flex-shrink: 0; transition: transform 0.3s ease; }

    .btn-toggle.open svg.arrow { transform: rotate(180deg); }

    /* ── VIEW SWITCHER ── */
    .view-switcher {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
    }

    .view-btn {
      width: 34px; height: 34px;
      border: none;
      background: transparent;
      border-radius: 50px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .view-btn.active {
      background: var(--royal-soft);
      color: var(--royal);
    }

    .view-btn:hover:not(.active) { color: var(--text-secondary); }

    /* ── CONTROLS ROW ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease, margin 0.3s ease;
    }

    .controls.visible {
      max-height: 100px;
      opacity: 1;
    }

    .count-tag {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }

    .count-tag strong { color: var(--royal); }

    /* ── MODULE SECTION ── */
    .module-section {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
    }

    .module-section.visible {
      max-height: 2000px;
      opacity: 1;
    }

    /* ── GRID VIEW ── */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    /* ── LIST VIEW ── */
    .module-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── CARD BASE ── */
    .module-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
      animation: fadeSlide 0.35s ease both;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .module-card:nth-child(1) { animation-delay: 0.03s; }
    .module-card:nth-child(2) { animation-delay: 0.07s; }
    .module-card:nth-child(3) { animation-delay: 0.11s; }
    .module-card:nth-child(4) { animation-delay: 0.15s; }
    .module-card:nth-child(5) { animation-delay: 0.19s; }
    .module-card:nth-child(6) { animation-delay: 0.23s; }
    .module-card:nth-child(7) { animation-delay: 0.27s; }
    .module-card:nth-child(8) { animation-delay: 0.31s; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .module-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--royal), var(--royal-light));
      opacity: 0;
      transition: opacity var(--transition);
    }

    .module-card:hover {
      border-color: var(--border-hover);
      background: var(--card-hover);
      box-shadow: var(--shadow-md);
      transform: translateY(-3px);
    }

    .module-card:hover::before { opacity: 1; }

    .module-card:active { transform: translateY(-1px); }

    /* ── GRID CARD INNER ── */
    .grid-mode .module-card { padding: 24px 20px 20px; }

    .card-icon-wrap {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--royal-soft);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
      transition: var(--transition);
    }

    .module-card:hover .card-icon-wrap {
      background: var(--royal);
    }

    .module-card:hover .card-icon-wrap svg { color: #fff; }

    .card-icon-wrap svg { color: var(--royal); transition: color var(--transition); }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
      margin-bottom: 5px;
    }

    .card-meta {
      font-size: 11.5px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .card-tag {
      font-size: 10.5px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      background: var(--royal-soft);
      color: var(--royal);
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .card-open {
      font-size: 11.5px;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 4px;
      transition: color var(--transition);
    }

    .module-card:hover .card-open { color: var(--royal); }

    /* ── LIST CARD INNER ── */
    .list-mode .module-card {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-radius: var(--radius-sm);
    }

    .list-mode .card-icon-wrap {
      width: 40px; height: 40px;
      border-radius: 10px;
      flex-shrink: 0;
      margin-bottom: 0;
    }

    .list-mode .card-body { flex: 1; min-width: 0; }

    .list-mode .card-title { margin-bottom: 2px; font-size: 13.5px; }

    .list-mode .card-meta { font-size: 11px; }

    .list-mode .card-tag { font-size: 10px; }

    .list-mode .card-footer {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
      flex-shrink: 0;
      gap: 12px;
    }

    .list-mode .card-open { display: none; }

    /* ── OPEN INDICATOR ── */
    .open-arrow {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: var(--royal-soft);
      display: flex; align-items: center; justify-content: center;
      color: var(--royal);
      flex-shrink: 0;
      transition: var(--transition);
    }

    .module-card:hover .open-arrow {
      background: var(--royal);
      color: #fff;
    }

    /* ── HIDDEN GRID ELEMENTS IN LIST MODE ── */
    .list-mode .card-footer .card-open { display: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .header { flex-direction: column; align-items: flex-start; }
      .module-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="breadcrumb"><span>Strand</span> / Modules</div>
      <h1><em>STEM</em> Module Materials</h1>
      <p class="subtitle">Access your PDF resources anytime — opens directly in your browser.</p>
    </div>

    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <button class="btn-toggle" id="toggleBtn" onclick="toggleModules()">
        <!-- folder icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        View Course Modules
        <!-- chevron arrow -->
        <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls" id="controls">
    <div class="count-tag"><strong id="countNum">12</strong> modules available</div>
    <div class="view-switcher">
      <button class="view-btn active" id="gridBtn" title="Grid view" onclick="setView('grid')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button class="view-btn" id="listBtn" title="List view" onclick="setView('list')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- MODULES -->
  <div class="module-section" id="moduleSection">
    <div class="module-grid grid-mode" id="moduleContainer">
      <!-- Cards injected by JS -->
    </div>
  </div>

</div>



<script>
  /* ── DATA ── */
  const modules = [
    { title: "Earth Science 1",         meta: "PDF · 1.44MB",  tag: "Lecture",   pdf: "STEM Earth Science_1.pdf" },
    { title: "Earth Science 2",        meta: "PDF · 2.08 MB",  tag: "Lecture",        pdf: "STEM Earth Science_2.pdf" },
    { title: "General Biology 1",        meta: "PDF · 2.30 MB",  tag: "Lecture",        pdf: "STEM General Biology_1.pdf" },
    { title: "General Biology 2",        meta: "PDF · 1.96 MB",  tag: "Lecture",        pdf: "STEM General Biology_2.pdf" },
    { title: "General Chemistry 1",        meta: "PDF · 1.23 MB",  tag: "Lecture",        pdf: "STEM General Chemistry_1.pdf" },
    { title: "General Chemistry 2",        meta: "PDF · 1.77 MB",  tag: "Lecture",        pdf: "STEM General Chemistry_2.pdf" },
    { title: "General Mathematics 1",        meta: "PDF · 1.34 MB",  tag: "Lecture",        pdf: "STEM General Mathematics_1.pdf" },
    { title: "General Mathematics 2",        meta: "PDF · 1.23 MB",  tag: "Lecture",        pdf: "STEM General Mathematics_2.pdf" },
    { title: "General Physics 1",        meta: "PDF · 2.46 MB",  tag: "Lecture",        pdf: "STEM General Physics_1.pdf" },
    { title: "General Physics 2",        meta: "PDF · 1.86 MB",  tag: "Lecture",        pdf: "STEM General Physics_2.pdf" },
    { title: "Pre-Calculus 1",        meta: "PDF · 1.87 MB",  tag: "Lecture",        pdf: "STEM Pre-Calculus_1.pdf" },
    { title: "Pre-Calculus 2",        meta: "PDF · 1.54 MB",  tag: "Lecture",        pdf: "STEM Pre-Calculus_2.pdf" },
  ];

  /* ── PDF ICON SVG ── */
  const pdfIcon = `
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="9" y1="15" x2="15" y2="15"/>
      <line x1="9" y1="11" x2="15" y2="11"/>
    </svg>`;

  const arrowIcon = `
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
      <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
    </svg>`;

  /* ── STATE ── */
  let isOpen  = false;
  let viewMode = 'grid';

  /* ── RENDER CARDS ── */
  function renderCards() {
    const container = document.getElementById('moduleContainer');
    container.innerHTML = modules.map((m, i) => `
      <a class="module-card"
         href="${m.pdf}"
         target="_blank"
         rel="noopener noreferrer"
         title="Open ${m.title} in new tab"
         onclick="openPDF(event, '${m.pdf}')">

        ${viewMode === 'grid' ? `
          <div class="card-icon-wrap">${pdfIcon}</div>
          <div class="card-title">${m.title}</div>
          <div class="card-meta">${m.meta}</div>
          <div class="card-footer">
            <span class="card-tag">${m.tag}</span>
            <span class="card-open">${arrowIcon} Open</span>
          </div>
        ` : `
          <div class="card-icon-wrap">${pdfIcon}</div>
          <div class="card-body">
            <div class="card-title">${m.title}</div>
            <div class="card-meta">${m.meta}</div>
          </div>
          <div class="card-footer">
            <span class="card-tag">${m.tag}</span>
            <span class="open-arrow">${arrowIcon}</span>
          </div>
        `}
      </a>
    `).join('');
  }

  /* ── OPEN PDF ── */
  function openPDF(event, pdf) {
    event.preventDefault();
    // Opens the PDF URL in a new tab (browser will render it, not download)
    window.open(pdf, '_blank', 'noopener,noreferrer');
  }

  /* ── TOGGLE VISIBILITY ── */
  function toggleModules() {
    isOpen = !isOpen;
    const section  = document.getElementById('moduleSection');
    const controls = document.getElementById('controls');
    const btn      = document.getElementById('toggleBtn');

    if (isOpen) {
      renderCards();
      section.classList.add('visible');
      controls.classList.add('visible');
      btn.classList.add('open');
    } else {
      section.classList.remove('visible');
      controls.classList.remove('visible');
      btn.classList.remove('open');
    }
  }

  /* ── SWITCH VIEW ── */
  function setView(mode) {
    viewMode = mode;
    const container = document.getElementById('moduleContainer');
    const gridBtn   = document.getElementById('gridBtn');
    const listBtn   = document.getElementById('listBtn');

    if (mode === 'grid') {
      container.className = 'module-grid grid-mode';
      gridBtn.classList.add('active');
      listBtn.classList.remove('active');
    } else {
      container.className = 'module-list list-mode';
      listBtn.classList.add('active');
      gridBtn.classList.remove('active');
    }
    renderCards();
  }

</script>

</body>
</html>
